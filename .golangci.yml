linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam

linters-settings:
  goimports:
    local-prefixes: github.com/Eweka01/aws-container-posture-auditor

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
